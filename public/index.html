<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>短剧脚本工坊 · ShortDrama Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <link rel="stylesheet" href="https://esm.sh/animal-island-ui@1.2.0/dist/index.css" />
  <link rel="stylesheet" href="css/app.css" />
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "animal-island-ui": "https://esm.sh/animal-island-ui@1.2.0?deps=react@18.3.1,react-dom@18.3.1"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <div id="__err" style="color:red;font-family:monospace;white-space:pre-wrap;padding:12px;position:fixed;bottom:0;left:0;right:0;max-height:40vh;overflow:auto;background:#fff;z-index:9999;display:none"></div>
  <script type="module" src="js/app.bundle.js?v=10"></script>
  <script>
    window.addEventListener('error', function(e) {
      var el = document.getElementById('__err');
      el.style.display = 'block';
      el.textContent += '\nERROR: ' + (e.message || '') + (e.filename ? ' @ ' + e.filename + ':' + e.lineno : '');
    });
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('__err');
      el.style.display = 'block';
      el.textContent += '\nPROMISE: ' + (e.reason && e.reason.message || e.reason);
    });
  </script>
</body>
</html>
